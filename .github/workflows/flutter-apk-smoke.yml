name: flutter-apk-smoke (reusable)

# Reusable workflow: build a DEBUG apk so a broken Android build is caught on
# every push, WITHOUT signing or store upload.
#
# Runs on the dedicated self-hosted Android runner (technas-android-build) — the
# backend ARC scale-set has no Android SDK. The Flutter+JDK+Android-SDK image is
# built from THIS repo's docker/mobile/Dockerfile (single source), so there is no
# per-runner provisioning drift and apps don't vendor a Dockerfile.
#
# It checks out two repos onto the runner:
#   - the CALLER app at the workspace root (so <app_dir>/ resolves)
#   - technas-workflows under .technas-workflows/ (for docker/mobile/Dockerfile)
#
# Usage (caller):
#
#   jobs:
#     smoke:
#       uses: Technas-Organization/technas-workflows/.github/workflows/flutter-apk-smoke.yml@main
#       with:
#         app_dir: flutter_app
#         app_id: fr.technas.eclatdor
#         dart_defines: "TENANT=eclatdor,API_BASE_URL=https://api-eclatdor.technas.fr"
#       secrets: inherit

on:
  workflow_call:
    inputs:
      app_dir:
        description: "Path to the Flutter app (the dir holding pubspec.yaml)."
        type: string
        required: true
      app_id:
        description: "Application id (informational; e.g. fr.technas.eclatdor). Used in the image tag + summary."
        type: string
        required: true
      dart_defines:
        description: "Comma-separated KEY=VALUE pairs passed as --dart-define."
        type: string
        default: ''
      env_copy_from:
        description: "Optional file (relative to app_dir) to copy to <app_dir>/.env before build (e.g. config/env.mobile). Needed when the app declares .env as a pubspec asset."
        type: string
        default: ''
      android_runner:
        description: "Runner label array for the Android self-hosted runner. NEVER ubuntu-latest."
        type: string
        default: '["self-hosted", "Linux", "X64", "technas-android-build"]'
      target_platform:
        description: >-
          Optional `--target-platform` for `flutter build apk` (e.g. android-arm64).
          A smoke only needs to prove the Android build graph compiles + assembles,
          so building a SINGLE ABI cuts the native-lib (mergeNativeLibs/strip) work
          ~3x and the peak memory accordingly — decisive on a memory-constrained ARC
          node. Empty (default) = fat APK (all ABIs), unchanged behaviour.
        type: string
        default: ''
      build_memory_limit:
        description: >-
          HARD cgroup memory cap (e.g. '6g') on the inner build container. The build
          runs in a NESTED docker whose cgroup ESCAPES the runner pod's limit, so on
          a shared ARC node (8 GB) a runaway build fills the node → kubelet OOM →
          NotReady ("runner lost communication"). With this set, the build container
          OOMs cleanly (the job fails/retries) and the NODE survives. Empty (default)
          = no cap (dedicated build machines with RAM to spare).
        type: string
        default: ''
      gradle_cache:
        description: >-
          Enable the in-cluster remote Gradle caches (Nexus Maven proxy + remote
          HttpBuildCache) via an injected init.gradle. On EPHEMERAL ARC runners this
          avoids re-downloading the Jitsi AAR + androidx + plugins every run and
          REUSES task outputs (compile/dex) for unchanged deps — which is what keeps
          peak memory under the node ceiling. Requires an in-cluster runner
          (ClusterIP). OFF by default — alters no existing build until enabled.
        type: boolean
        default: false
      gradle_cache_nexus_url:
        description: "Nexus Maven group URL (download proxy). In-cluster ClusterIP."
        type: string
        default: 'http://nexus.technas-infra.svc.cluster.local:8081/repository/maven-public/'
      gradle_cache_remote_url:
        description: "Remote Gradle build-cache URL (task outputs). In-cluster ClusterIP."
        type: string
        default: 'http://gradle-build-cache.technas-infra.svc.cluster.local:5071/cache/'
      submodules:
        type: string
        default: 'false'
      workflows_ref:
        description: "Ref of technas-workflows to check out for the shared Dockerfile (default: main)."
        type: string
        default: main
    secrets:
      PACKAGES_PAT:
        required: false

permissions:
  contents: read

jobs:
  apk-debug:
    runs-on: ${{ fromJSON(inputs.android_runner) }}
    env:
      MOBILE_BUILDER_IMAGE: technas-mobile-builder:ci
    steps:
      # Previous Docker runs may leave root-owned files → checkout cannot git
      # clean. Fix ownership via Docker root, then delete without sudo.
      - name: Reset workspace directory
        shell: bash
        run: |
          set -euo pipefail
          WS="${{ github.workspace }}"
          mkdir -p "$WS"
          docker run --rm -v "$WS:/ws" alpine:3.20 sh -c "chown -R $(id -u):$(id -g) /ws"
          shopt -s dotglob nullglob
          rm -rf "${WS:?}"/*

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.submodules }}
          token: ${{ secrets.PACKAGES_PAT || github.token }}

      - name: Checkout technas-workflows (shared Dockerfile)
        uses: actions/checkout@v4
        with:
          repository: Technas-Organization/technas-workflows
          ref: ${{ inputs.workflows_ref }}
          path: .technas-workflows
          token: ${{ secrets.PACKAGES_PAT || github.token }}

      # Remote Gradle caches (gated by gradle_cache). Drop the shared init script
      # into the build's GRADLE_USER_HOME (=/workspace/.gradle in the container):
      # Gradle auto-applies any init.d/*.gradle. The Nexus + build-cache URLs are
      # passed to the container as env vars (cf. Build step). Mirrors the proven
      # deploy-flutter-android reusable.
      - name: Install Gradle cache init script
        if: inputs.gradle_cache
        run: |
          set -euo pipefail
          mkdir -p "${{ github.workspace }}/.gradle/init.d"
          cp .technas-workflows/gradle/technas-cache.init.gradle \
             "${{ github.workspace }}/.gradle/init.d/technas-cache.gradle"
          echo "::notice::Gradle remote caches ON — Nexus Maven + HttpBuildCache (init.d injected)"

      - name: Copy environment file
        if: inputs.env_copy_from != ''
        working-directory: ${{ inputs.app_dir }}
        run: cp "${{ inputs.env_copy_from }}" .env

      - name: Build mobile-builder CI image
        # The Dockerfile does not COPY from the build context, so any context
        # works; use the shared checkout dir.
        run: |
          docker build -t "$MOBILE_BUILDER_IMAGE" \
            -f .technas-workflows/docker/mobile/Dockerfile \
            .technas-workflows

      - name: Get dependencies
        run: |
          docker run --rm \
            -e PUB_CACHE=/workspace/.pub-cache \
            -v "${{ github.workspace }}:/workspace" \
            -w "/workspace/${{ inputs.app_dir }}" \
            "$MOBILE_BUILDER_IMAGE" \
            flutter pub get

      - name: Build debug APK
        env:
          DART_DEFINES: ${{ inputs.dart_defines }}
        run: |
          define_args=""
          if [ -n "$DART_DEFINES" ]; then
            IFS=',' read -ra pairs <<< "$DART_DEFINES"
            for p in "${pairs[@]}"; do
              p="$(echo -n "$p" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
              [ -z "$p" ] && continue
              define_args="$define_args --dart-define=$p"
            done
          fi
          # Single-ABI smoke (gated by target_platform) — proves the build graph
          # compiles + assembles while cutting the native-lib work ~3x.
          abi_flag=""
          if [ -n "${{ inputs.target_platform }}" ]; then
            abi_flag="--target-platform ${{ inputs.target_platform }}"
            echo "::notice::APK smoke restricted to ABI ${{ inputs.target_platform }} (lighter build)"
          fi
          # HARD cgroup cap on the NESTED build container: its cgroup escapes the
          # runner pod limit, so without this a runaway build fills an 8 GB ARC node
          # → kubelet OOM → NotReady ("runner lost communication"). With it, the
          # build OOMs cleanly (job fails, node survives). Empty = no cap.
          MEM_FLAG=""
          if [ -n "${{ inputs.build_memory_limit }}" ]; then
            MEM_FLAG="--memory=${{ inputs.build_memory_limit }} --memory-swap=${{ inputs.build_memory_limit }}"
            echo "::notice::Build capped at ${{ inputs.build_memory_limit }} (cgroup, ARC node safety)"
          fi
          # Remote Gradle caches (gated). --network host : the nested build's
          # resolv.conf has no coredns → without host net it can't resolve
          # *.svc.cluster.local nor reach the Nexus/build-cache ClusterIPs.
          # GRADLE_USER_HOME points at /workspace/.gradle where init.d was dropped.
          CACHE_FLAGS=""
          if [ "${{ inputs.gradle_cache }}" = "true" ]; then
            CACHE_FLAGS="--network host \
              -e GRADLE_USER_HOME=/workspace/.gradle \
              -e NEXUS_MAVEN_URL=${{ inputs.gradle_cache_nexus_url }} \
              -e GRADLE_REMOTE_CACHE_URL=${{ inputs.gradle_cache_remote_url }}"
          fi
          # tee the full build output to a workspace file (volume-mounted, so it
          # survives on the runner host) and `set -o pipefail` so the step still
          # fails on a build error. The self-hosted ARC runner's Actions log often
          # fails to upload (BlobNotFound), so the artifact below is the reliable
          # way to read gradle/flutter errors after the fact.
          docker run --rm $MEM_FLAG $CACHE_FLAGS \
            -e PUB_CACHE=/workspace/.pub-cache \
            -v "${{ github.workspace }}:/workspace" \
            -w "/workspace/${{ inputs.app_dir }}" \
            "$MOBILE_BUILDER_IMAGE" \
            bash -lc "set -o pipefail; flutter build apk --debug $abi_flag $define_args 2>&1 | tee /workspace/apk_build.log"

      - name: Upload build log (ARC Actions logs purge — artifact is reliable)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-build-log-${{ inputs.app_id }}
          path: ${{ github.workspace }}/apk_build.log
          if-no-files-found: ignore
          retention-days: 5

      - name: Summary
        if: always()
        run: |
          echo "### APK smoke — ${{ inputs.app_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "App dir: \`${{ inputs.app_dir }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Repair workspace ownership after Docker
        if: always()
        run: docker run --rm -v "${{ github.workspace }}:/ws" alpine:3.20 sh -c "chown -R $(id -u):$(id -g) /ws"
