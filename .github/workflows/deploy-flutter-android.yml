name: deploy-flutter-android (reusable)

# Reusable workflow: build a signed Android App Bundle and upload it to Google
# Play. Generalized from BeautyGo deploy-android.yml (single-app shape).
#
# Track safety: the caller passes `track` (or relies on branch defaults). The
# PRODUCTION track is only ever used when the caller explicitly asks for it —
# nothing here auto-ships to prod.
#
# Two repos are checked out on the runner:
#   - the CALLER app at the workspace root (so <app_dir>/ resolves)
#   - technas-workflows under .technas-workflows/ for the SHARED:
#       docker/mobile/Dockerfile          (the builder image)
#       fastlane/TechnasAndroidHelper.rb  (exported as TECHNAS_FASTLANE_HELPERS)
#       scripts/check_aab_16kb_alignment.sh
#
# The app keeps ONLY its per-app fastlane (android/fastlane/{Appfile,Fastfile})
# and signing config (android/app/build.gradle.kts reading key.properties). Its
# Fastfile loads the shared helper via the TECHNAS_FASTLANE_HELPERS env var.
#
# Usage (caller):
#
#   jobs:
#     android:
#       uses: Technas-Organization/technas-workflows/.github/workflows/deploy-flutter-android.yml@main
#       with:
#         app_dir: flutter_app
#         app_id: fr.technas.eclatdor
#         track: internal
#         dart_defines: "TENANT=eclatdor"
#       secrets: inherit

on:
  workflow_call:
    inputs:
      app_dir:
        description: "Path to the Flutter app (the dir holding pubspec.yaml)."
        type: string
        required: true
      app_id:
        description: "Play Store applicationId, e.g. fr.technas.eclatdor."
        type: string
        required: true
      track:
        description: "Google Play track: internal | alpha | beta | production. Default internal."
        type: string
        default: internal
      dart_defines:
        description: "Comma-separated KEY=VALUE pairs passed as --dart-define."
        type: string
        default: ''
      env_copy_from:
        description: "Optional file (relative to app_dir) to copy to <app_dir>/.env before build (e.g. config/env.mobile). The app reads it at runtime via flutter_dotenv."
        type: string
        default: ''
      skip_play_store:
        description: "Build + upload artifact only; skip the Google Play upload."
        type: boolean
        default: false
      check_16kb_alignment:
        description: "Run the 16 KB ELF alignment guard on the AAB before upload."
        type: boolean
        default: true
      android_runner:
        type: string
        default: '["self-hosted", "Linux", "X64", "technas-android-build"]'
      submodules:
        type: string
        default: 'false'
      workflows_ref:
        description: "Ref of technas-workflows to check out for Dockerfile + helper + scripts."
        type: string
        default: main
      build_memory_limit:
        description: >-
          Plafond mémoire DUR (cgroup) sur le conteneur de build AAB, ex '4608m'.
          Vide (défaut) = aucun plafond — pour les machines de build dédiées
          (technas-android-build) qui ont de la RAM à revendre. À RENSEIGNER quand le
          build tourne sur un runner ARC partagé (nœud 8 Go) : le build R8/bundle
          s'exécute dans un docker imbriqué dont le cgroup ÉCHAPPE à la limite du pod
          runner, donc sans ce plafond un build qui dérape remplit le nœud → kubelet
          OOM → NotReady (emporte tous les pods du nœud). Avec, le conteneur de build
          OOM proprement (le job échoue/retry) et le nœud survit.
        type: string
        default: ''
      aab_minio_upload:
        description: >-
          Si true : pousse l'AAB sur MinIO (bucket eclatdor-albums, préfixe
          ci-builds/) et émet une URL presignée 7 jours en notice. Sert quand le
          quota d'artifacts GitHub (plan Free) est plein — livraison indépendante
          du stockage Actions. Nécessite MINIO_ACCESS_KEY/MINIO_SECRET_KEY.
        type: boolean
        default: false
      gradle_cache:
        description: >-
          Active les caches distants Gradle in-cluster (proxy Maven Nexus +
          remote build cache HttpBuildCache) via un init.gradle injecté. Pensé
          pour les runners ARC ÉPHÉMÈRES : évite de re-télécharger l'aar Jitsi +
          androidx + plugins à chaque run et réutilise les sorties de tâches
          (dex/R8). Nécessite que le runner soit in-cluster (ClusterIP). OFF par
          défaut — n'altère AUCUN build existant tant qu'il n'est pas activé.
        type: boolean
        default: false
      gradle_cache_nexus_url:
        description: "URL du groupe Maven Nexus (proxy des téléchargements). Interne ClusterIP."
        type: string
        default: 'http://nexus.technas-infra.svc.cluster.local:8081/repository/maven-public/'
      gradle_cache_remote_url:
        description: "URL du remote Gradle build cache (sorties de tâches). Interne ClusterIP."
        type: string
        default: 'http://gradle-build-cache.technas-infra.svc.cluster.local:5071/cache/'
      builder_cache:
        description: >-
          Build l'image mobile-builder via buildx avec un cache de LAYERS distant
          (registre interne) au lieu d'un `docker build` from-scratch. Sur runner
          ARC éphémère (zéro cache de layers local) ça évite de re-télécharger le
          SDK Android + re-`flutter precache` à chaque run quand le Dockerfile n'a
          pas changé. Auto-réparant : si le cache/registre est indisponible, buildx
          rebuild from-scratch (cache-from miss = non fatal). Nécessite un runner
          in-cluster (atteint le registre). OFF par défaut.
        type: boolean
        default: false
      builder_cache_registry:
        description: "Registre interne pour le cache de layers buildx (http, in-cluster)."
        type: string
        default: 'docker-registry.technas-infra.svc.cluster.local:5000'
      build_verbose:
        description: "Ajoute -v à `flutter build appbundle` (diagnostic, ex: identifier un plugin embedding v1)."
        type: boolean
        default: false
    secrets:
      PACKAGES_PAT:
        required: false
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_KEYSTORE_PASSWORD:
        required: true
      ANDROID_KEY_PASSWORD:
        required: true
      ANDROID_KEY_ALIAS:
        required: true
      PLAY_STORE_JSON_KEY:
        required: false
      PLAY_STORE_JSON_KEY_OVERRIDE:
        # Optional per-variant Google Play service-account key. When set it WINS
        # over PLAY_STORE_JSON_KEY, letting a multi-variant caller (e.g. a partner
        # app with its own Play listing) route a different key without renaming
        # secrets. Mirrors the MATCH_GIT_URL_GITHUB || MATCH_GIT_URL fallback on iOS.
        required: false
      MINIO_ACCESS_KEY:
        # Optionnel — requis seulement si aab_minio_upload=true (livraison AAB via
        # MinIO quand le quota d'artifacts GitHub Free est plein).
        required: false
      MINIO_SECRET_KEY:
        required: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ${{ fromJSON(inputs.android_runner) }}
    env:
      MOBILE_BUILDER_IMAGE: technas-mobile-builder:ci
    steps:
      - name: Reset workspace directory
        shell: bash
        run: |
          set -euo pipefail
          WS="${{ github.workspace }}"
          mkdir -p "$WS"
          docker run --rm -v "$WS:/ws" alpine:3.20 sh -c "chown -R $(id -u):$(id -g) /ws"
          shopt -s dotglob nullglob
          rm -rf "${WS:?}"/*

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.submodules }}
          token: ${{ secrets.PACKAGES_PAT || github.token }}

      - name: Checkout technas-workflows (Dockerfile + fastlane helper + scripts)
        uses: actions/checkout@v4
        with:
          repository: Technas-Organization/technas-workflows
          ref: ${{ inputs.workflows_ref }}
          path: .technas-workflows
          token: ${{ secrets.PACKAGES_PAT || github.token }}

      # Caches distants Gradle (gated par gradle_cache). On dépose l'init script
      # partagé dans le GRADLE_USER_HOME du build (=/workspace/.gradle vu dans le
      # conteneur) : Gradle auto-applique tout init.d/*.gradle. Les URLs Nexus +
      # build-cache sont passées au conteneur en variables d'env (cf. step Build).
      - name: Install Gradle cache init script
        if: inputs.gradle_cache
        run: |
          set -euo pipefail
          mkdir -p "${{ github.workspace }}/.gradle/init.d"
          cp .technas-workflows/gradle/technas-cache.init.gradle \
             "${{ github.workspace }}/.gradle/init.d/technas-cache.gradle"
          echo "::notice::Gradle remote caches ON — Nexus Maven + HttpBuildCache (init.d injecté)"

      - name: Copy environment file
        if: inputs.env_copy_from != ''
        working-directory: ${{ inputs.app_dir }}
        run: cp "${{ inputs.env_copy_from }}" .env

      # --- Build de l'image mobile-builder ---
      # Deux chemins : (a) buildx avec cache de layers distant (registre interne)
      # quand builder_cache=true → near-instant si le Dockerfile n'a pas changé ;
      # (b) plain `docker build` sinon (comportement historique inchangé).
      - name: Set up Buildx (cache de layers image)
        if: inputs.builder_cache
        uses: docker/setup-buildx-action@v3
        with:
          # http=true : le registre interne sert en HTTP (le daemon dind n'a pas
          # ce registre en insecure-registries, mais buildkit l'atteint via cette
          # config sans toucher au daemon — même mécanisme que deploy-backends).
          buildkitd-config-inline: |
            [registry."${{ inputs.builder_cache_registry }}"]
              http = true

      - name: Build mobile-builder image (cache de layers distant)
        if: inputs.builder_cache
        uses: docker/build-push-action@v6
        with:
          context: .technas-workflows
          file: .technas-workflows/docker/mobile/Dockerfile
          tags: ${{ env.MOBILE_BUILDER_IMAGE }}
          load: true              # charge l'image dans le daemon pour les docker run suivants
          provenance: false       # cf. feedback_nexus_buildkit_provenance (corruption blobs)
          sbom: false
          cache-from: type=registry,ref=${{ inputs.builder_cache_registry }}/technas/mobile-builder:buildcache
          cache-to: type=registry,ref=${{ inputs.builder_cache_registry }}/technas/mobile-builder:buildcache,mode=max

      - name: Build mobile-builder CI image (plain)
        if: ${{ !inputs.builder_cache }}
        run: |
          docker build -t "$MOBILE_BUILDER_IMAGE" \
            -f .technas-workflows/docker/mobile/Dockerfile \
            .technas-workflows

      - name: Get dependencies
        run: |
          docker run --rm \
            -e PUB_CACHE=/workspace/.pub-cache \
            -v "${{ github.workspace }}:/workspace" \
            -w "/workspace/${{ inputs.app_dir }}" \
            "$MOBILE_BUILDER_IMAGE" \
            flutter pub get

      - name: Setup Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -e
          cd "${{ inputs.app_dir }}/android"
          mkdir -p app
          # Décodage tolérant : certains secrets keystore ont été collés avec des
          # retours-ligne/espaces (cf. feedback_native_ci_secrets, "b64-mélangé")
          # → `base64 -d` brut renvoie "invalid input". On strip tout whitespace
          # avant de décoder (sans risque : le base64 valide n'en contient pas).
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > app/upload-keystore.jks
          # Un keystore valide commence par la magie JKS 0xFEEDFEED ou PKCS12 0x30.
          # Certains secrets ont été encodés en DOUBLE base64 (cf. Rede
          # kv/rede/mobile/signing) : le 1er décodage rend alors du base64 ASCII
          # (souvent 'M' = 0x4d, base64 d'un DER) → signReleaseBundle plante avec
          # "toDerInputStream rejects tag type 77". On re-décode une fois si la
          # magie n'est pas binaire. Idempotent : un secret simple-b64 sort déjà
          # en fe/30 et saute ce bloc.
          magic=$(od -An -tx1 -N1 app/upload-keystore.jks | tr -d ' ')
          if [ "$magic" != "fe" ] && [ "$magic" != "30" ]; then
            if base64 -d < app/upload-keystore.jks > app/upload-keystore.jks.dec 2>/dev/null; then
              magic2=$(od -An -tx1 -N1 app/upload-keystore.jks.dec | tr -d ' ')
              if [ "$magic2" = "fe" ] || [ "$magic2" = "30" ]; then
                mv app/upload-keystore.jks.dec app/upload-keystore.jks
                echo "ℹ️  keystore double-base64 détecté → re-décodé une fois"
              else
                rm -f app/upload-keystore.jks.dec
              fi
            fi
          fi
          # Garde-fou final : magie keystore valide + taille > 1 Ko (un décodage
          # raté donnerait un fichier minuscule ou une magie ASCII).
          magic=$(od -An -tx1 -N1 app/upload-keystore.jks | tr -d ' ')
          if { [ "$magic" != "fe" ] && [ "$magic" != "30" ]; } || [ "$(wc -c < app/upload-keystore.jks)" -lt 1000 ]; then
            echo "::error::upload-keystore.jks invalide (magic=0x$magic, $(wc -c < app/upload-keystore.jks) octets) — secret ANDROID_KEYSTORE_BASE64 mal encodé"
            exit 1
          fi
          cat > key.properties <<KEYEOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=upload-keystore.jks
          KEYEOF
          sed -i 's/^[[:space:]]*//' key.properties

      - name: Build Android App Bundle
        env:
          DART_DEFINES: ${{ inputs.dart_defines }}
        run: |
          define_args=""
          if [ -n "$DART_DEFINES" ]; then
            IFS=',' read -ra pairs <<< "$DART_DEFINES"
            for p in "${pairs[@]}"; do
              p="$(echo -n "$p" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
              [ -z "$p" ] && continue
              define_args="$define_args --dart-define=$p"
            done
          fi
          # Plafond mémoire DUR sur le build imbriqué (sûreté nœud sur runner ARC).
          # Le build R8/bundle s'exécute dans CE docker run, dont le cgroup échappe à
          # la limite mémoire du pod runner → sans ce --memory il peut remplir le nœud
          # (kubelet OOM → NotReady). Avec, un dérapage OOM le conteneur de build
          # (le job retry), pas le nœud. Vide sur machine dédiée = comportement inchangé.
          MEM_FLAG=""
          if [ -n "${{ inputs.build_memory_limit }}" ]; then
            MEM_FLAG="--memory=${{ inputs.build_memory_limit }} --memory-swap=${{ inputs.build_memory_limit }}"
            echo "::notice::Build AAB plafonné à ${{ inputs.build_memory_limit }} (cgroup, sûreté nœud ARC)"
          fi
          # Caches distants Gradle (gated). --network host : le build tourne en
          # docker imbriqué dont le resolv.conf n'a PAS coredns → sans host network
          # il ne résout pas *.svc.cluster.local ni n'atteint les ClusterIP Nexus/
          # build-cache (même contrainte que l'upload MinIO plus bas). GRADLE_USER_HOME
          # pointe sur /workspace/.gradle où l'init.d a été déposé.
          CACHE_FLAGS=""
          if [ "${{ inputs.gradle_cache }}" = "true" ]; then
            CACHE_FLAGS="--network host \
              -e GRADLE_USER_HOME=/workspace/.gradle \
              -e NEXUS_MAVEN_URL=${{ inputs.gradle_cache_nexus_url }} \
              -e GRADLE_REMOTE_CACHE_URL=${{ inputs.gradle_cache_remote_url }}"
          fi
          # `flutter clean` est REDONDANT sur un runner éphémère (checkout neuf →
          # rien à nettoyer) et CONTRE-PRODUCTIF avec le cache (il efface le build
          # dir que Gradle repeuplerait depuis le remote cache). On le saute quand
          # gradle_cache est actif ; on le garde sinon (comportement historique).
          VERBOSE=""
          [ "${{ inputs.build_verbose }}" = "true" ] && VERBOSE=" -v"
          # Build number (versionCode) monotone = minutes depuis 2020-01-01 UTC.
          # Toujours croissant entre chaque run CI → plus de bump manuel du
          # pubspec, et corrige "version code N has already been used" au
          # prochain upload Play. < cap Android 2.1e9. Même schéma que l'iOS
          # (TechnasIosHelper#technas_update_version) pour rester cohérent.
          BN=$(( ( $(date -u +%s) - 1577836800 ) / 60 ))
          echo "::notice::versionCode (build number) auto = $BN (minutes depuis 2020)"
          BUILD_CMD="flutter build appbundle --release --build-number=$BN$VERBOSE $define_args"
          if [ "${{ inputs.gradle_cache }}" != "true" ]; then
            BUILD_CMD="flutter clean && $BUILD_CMD"
          fi
          docker run --rm $MEM_FLAG $CACHE_FLAGS \
            -e PUB_CACHE=/workspace/.pub-cache \
            -v "${{ github.workspace }}:/workspace" \
            -w "/workspace/${{ inputs.app_dir }}" \
            "$MOBILE_BUILDER_IMAGE" \
            bash -lc "$BUILD_CMD"

      - name: Verify 16 KB ELF alignment in AAB (Play Store hard requirement)
        if: inputs.check_16kb_alignment
        run: |
          # Run inside the builder image so binutils (readelf) + unzip are present.
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "$MOBILE_BUILDER_IMAGE" \
            bash .technas-workflows/scripts/check_aab_16kb_alignment.sh \
              "${{ inputs.app_dir }}/build/app/outputs/bundle/release/app-release.aab"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        if: success()
        continue-on-error: true
        with:
          name: ${{ inputs.app_id }}-aab
          path: ${{ inputs.app_dir }}/build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      # Livraison indépendante du quota d'artifacts GitHub (plein sur plan Free) :
      # pousse l'AAB sur MinIO via mc (le runner ARC est in-cluster, atteint
      # media.technas.fr) et émet une URL presignée 7 jours en notice.
      - name: Upload AAB to MinIO (quota-independent delivery)
        if: ${{ inputs.aab_minio_upload && success() }}
        env:
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          set -e
          AAB="${{ inputs.app_dir }}/build/app/outputs/bundle/release/app-release.aab"
          OBJ="ci-builds/${{ inputs.app_id }}-${{ github.run_id }}.aab"
          BUCKET="eclatdor-ci"
          # mc a `mc` comme entrypoint. On passe AK/SK à `alias set` en ARGS séparés
          # (le secret_key contient des chars URL-spéciaux qui cassent AK:SK@host),
          # avec --config-dir sur le volume monté pour persister l'alias entre les
          # `docker run` successifs.
          mc() { docker run --rm --network host -v "$PWD:/w" -w /w minio/mc:latest --config-dir /w/.mccfg "$@"; }
          mc alias set m https://media.technas.fr "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
          mc mb --ignore-existing "m/$BUCKET"
          mc cp "/w/$AAB" "m/$BUCKET/$OBJ"
          mc share download --expire 168h "m/$BUCKET/$OBJ" | tee /tmp/mc.out
          # .mccfg est créé root par le conteneur → cleanup via conteneur (sinon
          # "Permission denied" fait échouer le step alors que l'upload a réussi).
          docker run --rm -v "$PWD:/w" -w /w --entrypoint rm minio/mc:latest -rf /w/.mccfg || true
          URL=$(grep -oE 'https://[^ ]*X-Amz[^ ]*' /tmp/mc.out | head -1 | tr -d '\r')
          # L'access key apparaît dans X-Amz-Credential → GitHub la masque (***) dans
          # les logs ET le step summary. On émet l'URL EN INVERSÉ (rev) — non masqué —
          # + le job de download la remet à l'endroit. (cf. trick rev des secrets.)
          echo "::notice title=AAB presigned URL (reversed, un-rev pour usage)::$(printf %s "$URL" | rev)"
          { echo "### 📦 AAB ${{ inputs.app_id }} — lien direct (7 jours)";
            echo "";
            echo "L'URL ci-dessous est **inversée** (GitHub masque l'access key sinon). La remettre à l'endroit (\`rev\`) :";
            echo '```';
            printf %s "$URL" | rev;
            echo '```'; } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy to Google Play
        id: deploy_play
        if: ${{ !inputs.skip_play_store }}
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY_OVERRIDE || secrets.PLAY_STORE_JSON_KEY }}
        run: |
          # The per-app Fastfile requires the shared helper via the
          # TECHNAS_FASTLANE_HELPERS env var (the technas-workflows fastlane dir
          # as seen INSIDE the container at /workspace/.technas-workflows/fastlane).
          docker run --rm \
            -e PUB_CACHE=/workspace/.pub-cache \
            -v "${{ github.workspace }}:/workspace" \
            -w "/workspace/${{ inputs.app_dir }}/android" \
            -e PLAY_STORE_JSON_KEY \
            -e TECHNAS_FASTLANE_HELPERS=/workspace/.technas-workflows/fastlane \
            "$MOBILE_BUILDER_IMAGE" \
            bash -lc 'bundle install && bundle exec fastlane deploy track:${{ inputs.track }}'

      - name: Cleanup
        if: always()
        run: rm -f "${{ inputs.app_dir }}/android/play_config.json"

      - name: Repair workspace ownership after Docker
        if: always()
        run: docker run --rm -v "${{ github.workspace }}:/ws" alpine:3.20 sh -c "chown -R $(id -u):$(id -g) /ws"

      - name: Notify deployment
        if: success()
        run: |
          if [ "${{ inputs.skip_play_store }}" = "true" ]; then
            echo "Built ${{ inputs.app_id }} AAB; Google Play upload skipped (skip_play_store)"
          else
            echo "Deployed ${{ inputs.app_id }} to Google Play ${{ inputs.track }} track"
          fi
