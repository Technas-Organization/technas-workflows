name: deploy-flutter-android (reusable)

# Reusable workflow: build a signed Android App Bundle and upload it to Google
# Play. Generalized from BeautyGo deploy-android.yml (single-app shape).
#
# Track safety: the caller passes `track` (or relies on branch defaults). The
# PRODUCTION track is only ever used when the caller explicitly asks for it —
# nothing here auto-ships to prod.
#
# Two repos are checked out on the runner:
#   - the CALLER app at the workspace root (so <app_dir>/ resolves)
#   - technas-workflows under .technas-workflows/ for the SHARED:
#       docker/mobile/Dockerfile          (the builder image)
#       fastlane/TechnasAndroidHelper.rb  (exported as TECHNAS_FASTLANE_HELPERS)
#       scripts/check_aab_16kb_alignment.sh
#
# The app keeps ONLY its per-app fastlane (android/fastlane/{Appfile,Fastfile})
# and signing config (android/app/build.gradle.kts reading key.properties). Its
# Fastfile loads the shared helper via the TECHNAS_FASTLANE_HELPERS env var.
#
# Usage (caller):
#
#   jobs:
#     android:
#       uses: Technas-Organization/technas-workflows/.github/workflows/deploy-flutter-android.yml@main
#       with:
#         app_dir: flutter_app
#         app_id: fr.technas.eclatdor
#         track: internal
#         dart_defines: "TENANT=eclatdor"
#       secrets: inherit

on:
  workflow_call:
    inputs:
      app_dir:
        description: "Path to the Flutter app (the dir holding pubspec.yaml)."
        type: string
        required: true
      app_id:
        description: "Play Store applicationId, e.g. fr.technas.eclatdor."
        type: string
        required: true
      track:
        description: "Google Play track: internal | alpha | beta | production. Default internal."
        type: string
        default: internal
      dart_defines:
        description: "Comma-separated KEY=VALUE pairs passed as --dart-define."
        type: string
        default: ''
      env_copy_from:
        description: "Optional file (relative to app_dir) to copy to <app_dir>/.env before build (e.g. config/env.mobile). The app reads it at runtime via flutter_dotenv."
        type: string
        default: ''
      skip_play_store:
        description: "Build + upload artifact only; skip the Google Play upload."
        type: boolean
        default: false
      check_16kb_alignment:
        description: "Run the 16 KB ELF alignment guard on the AAB before upload."
        type: boolean
        default: true
      android_runner:
        type: string
        default: '["self-hosted", "Linux", "X64", "technas-android-build"]'
      submodules:
        type: string
        default: 'false'
      workflows_ref:
        description: "Ref of technas-workflows to check out for Dockerfile + helper + scripts."
        type: string
        default: main
      build_memory_limit:
        description: >-
          Plafond mémoire DUR (cgroup) sur le conteneur de build AAB, ex '4608m'.
          Vide (défaut) = aucun plafond — pour les machines de build dédiées
          (technas-android-build) qui ont de la RAM à revendre. À RENSEIGNER quand le
          build tourne sur un runner ARC partagé (nœud 8 Go) : le build R8/bundle
          s'exécute dans un docker imbriqué dont le cgroup ÉCHAPPE à la limite du pod
          runner, donc sans ce plafond un build qui dérape remplit le nœud → kubelet
          OOM → NotReady (emporte tous les pods du nœud). Avec, le conteneur de build
          OOM proprement (le job échoue/retry) et le nœud survit.
        type: string
        default: ''
      aab_minio_upload:
        description: >-
          Si true : pousse l'AAB sur MinIO (bucket eclatdor-albums, préfixe
          ci-builds/) et émet une URL presignée 7 jours en notice. Sert quand le
          quota d'artifacts GitHub (plan Free) est plein — livraison indépendante
          du stockage Actions. Nécessite MINIO_ACCESS_KEY/MINIO_SECRET_KEY.
        type: boolean
        default: false
    secrets:
      PACKAGES_PAT:
        required: false
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_KEYSTORE_PASSWORD:
        required: true
      ANDROID_KEY_PASSWORD:
        required: true
      ANDROID_KEY_ALIAS:
        required: true
      PLAY_STORE_JSON_KEY:
        required: false
      PLAY_STORE_JSON_KEY_OVERRIDE:
        # Optional per-variant Google Play service-account key. When set it WINS
        # over PLAY_STORE_JSON_KEY, letting a multi-variant caller (e.g. a partner
        # app with its own Play listing) route a different key without renaming
        # secrets. Mirrors the MATCH_GIT_URL_GITHUB || MATCH_GIT_URL fallback on iOS.
        required: false
      MINIO_ACCESS_KEY:
        # Optionnel — requis seulement si aab_minio_upload=true (livraison AAB via
        # MinIO quand le quota d'artifacts GitHub Free est plein).
        required: false
      MINIO_SECRET_KEY:
        required: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ${{ fromJSON(inputs.android_runner) }}
    env:
      MOBILE_BUILDER_IMAGE: technas-mobile-builder:ci
    steps:
      - name: Reset workspace directory
        shell: bash
        run: |
          set -euo pipefail
          WS="${{ github.workspace }}"
          mkdir -p "$WS"
          docker run --rm -v "$WS:/ws" alpine:3.20 sh -c "chown -R $(id -u):$(id -g) /ws"
          shopt -s dotglob nullglob
          rm -rf "${WS:?}"/*

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.submodules }}
          token: ${{ secrets.PACKAGES_PAT || github.token }}

      - name: Checkout technas-workflows (Dockerfile + fastlane helper + scripts)
        uses: actions/checkout@v4
        with:
          repository: Technas-Organization/technas-workflows
          ref: ${{ inputs.workflows_ref }}
          path: .technas-workflows
          token: ${{ secrets.PACKAGES_PAT || github.token }}

      - name: Copy environment file
        if: inputs.env_copy_from != ''
        working-directory: ${{ inputs.app_dir }}
        run: cp "${{ inputs.env_copy_from }}" .env

      - name: Build mobile-builder CI image
        run: |
          docker build -t "$MOBILE_BUILDER_IMAGE" \
            -f .technas-workflows/docker/mobile/Dockerfile \
            .technas-workflows

      - name: Get dependencies
        run: |
          docker run --rm \
            -e PUB_CACHE=/workspace/.pub-cache \
            -v "${{ github.workspace }}:/workspace" \
            -w "/workspace/${{ inputs.app_dir }}" \
            "$MOBILE_BUILDER_IMAGE" \
            flutter pub get

      - name: Setup Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -e
          cd "${{ inputs.app_dir }}/android"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/upload-keystore.jks
          cat > key.properties <<KEYEOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=upload-keystore.jks
          KEYEOF
          sed -i 's/^[[:space:]]*//' key.properties

      - name: Build Android App Bundle
        env:
          DART_DEFINES: ${{ inputs.dart_defines }}
        run: |
          define_args=""
          if [ -n "$DART_DEFINES" ]; then
            IFS=',' read -ra pairs <<< "$DART_DEFINES"
            for p in "${pairs[@]}"; do
              p="$(echo -n "$p" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
              [ -z "$p" ] && continue
              define_args="$define_args --dart-define=$p"
            done
          fi
          # Plafond mémoire DUR sur le build imbriqué (sûreté nœud sur runner ARC).
          # Le build R8/bundle s'exécute dans CE docker run, dont le cgroup échappe à
          # la limite mémoire du pod runner → sans ce --memory il peut remplir le nœud
          # (kubelet OOM → NotReady). Avec, un dérapage OOM le conteneur de build
          # (le job retry), pas le nœud. Vide sur machine dédiée = comportement inchangé.
          MEM_FLAG=""
          if [ -n "${{ inputs.build_memory_limit }}" ]; then
            MEM_FLAG="--memory=${{ inputs.build_memory_limit }} --memory-swap=${{ inputs.build_memory_limit }}"
            echo "::notice::Build AAB plafonné à ${{ inputs.build_memory_limit }} (cgroup, sûreté nœud ARC)"
          fi
          docker run --rm $MEM_FLAG \
            -e PUB_CACHE=/workspace/.pub-cache \
            -v "${{ github.workspace }}:/workspace" \
            -w "/workspace/${{ inputs.app_dir }}" \
            "$MOBILE_BUILDER_IMAGE" \
            bash -lc "flutter clean && flutter build appbundle --release $define_args"

      - name: Verify 16 KB ELF alignment in AAB (Play Store hard requirement)
        if: inputs.check_16kb_alignment
        run: |
          # Run inside the builder image so binutils (readelf) + unzip are present.
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "$MOBILE_BUILDER_IMAGE" \
            bash .technas-workflows/scripts/check_aab_16kb_alignment.sh \
              "${{ inputs.app_dir }}/build/app/outputs/bundle/release/app-release.aab"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        if: success()
        continue-on-error: true
        with:
          name: ${{ inputs.app_id }}-aab
          path: ${{ inputs.app_dir }}/build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      # Livraison indépendante du quota d'artifacts GitHub (plein sur plan Free) :
      # pousse l'AAB sur MinIO via mc (le runner ARC est in-cluster, atteint
      # media.technas.fr) et émet une URL presignée 7 jours en notice.
      - name: Upload AAB to MinIO (quota-independent delivery)
        if: ${{ inputs.aab_minio_upload && success() }}
        env:
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          set -e
          AAB="${{ inputs.app_dir }}/build/app/outputs/bundle/release/app-release.aab"
          OBJ="ci-builds/${{ inputs.app_id }}-${{ github.run_id }}.aab"
          HOST="https://${MINIO_ACCESS_KEY}:${MINIO_SECRET_KEY}@media.technas.fr"
          # minio/mc a `mc` comme ENTRYPOINT → on passe les sous-commandes directement
          # (PAS `sh -c`, qui devient `mc sh`). 2 runs : cp puis share.
          docker run --rm --network host -v "$PWD:/w" -w /w \
            -e MC_HOST_m="$HOST" \
            minio/mc:latest cp "/w/$AAB" "m/eclatdor-albums/$OBJ"
          docker run --rm --network host \
            -e MC_HOST_m="$HOST" \
            minio/mc:latest share download --expire 168h "m/eclatdor-albums/$OBJ" | tee /tmp/mc.out
          URL=$(grep -oE 'https?://[^ ]*X-Amz[^ ]*' /tmp/mc.out | head -1 | tr -d '\r')
          echo "::notice title=AAB download (7j)::$URL"
          { echo "### 📦 AAB ${{ inputs.app_id }} — lien direct (7 jours)"; echo ""; echo "$URL"; } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy to Google Play
        id: deploy_play
        if: ${{ !inputs.skip_play_store }}
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY_OVERRIDE || secrets.PLAY_STORE_JSON_KEY }}
        run: |
          # The per-app Fastfile requires the shared helper via the
          # TECHNAS_FASTLANE_HELPERS env var (the technas-workflows fastlane dir
          # as seen INSIDE the container at /workspace/.technas-workflows/fastlane).
          docker run --rm \
            -e PUB_CACHE=/workspace/.pub-cache \
            -v "${{ github.workspace }}:/workspace" \
            -w "/workspace/${{ inputs.app_dir }}/android" \
            -e PLAY_STORE_JSON_KEY \
            -e TECHNAS_FASTLANE_HELPERS=/workspace/.technas-workflows/fastlane \
            "$MOBILE_BUILDER_IMAGE" \
            bash -lc 'bundle install && bundle exec fastlane deploy track:${{ inputs.track }}'

      - name: Cleanup
        if: always()
        run: rm -f "${{ inputs.app_dir }}/android/play_config.json"

      - name: Repair workspace ownership after Docker
        if: always()
        run: docker run --rm -v "${{ github.workspace }}:/ws" alpine:3.20 sh -c "chown -R $(id -u):$(id -g) /ws"

      - name: Notify deployment
        if: success()
        run: |
          if [ "${{ inputs.skip_play_store }}" = "true" ]; then
            echo "Built ${{ inputs.app_id }} AAB; Google Play upload skipped (skip_play_store)"
          else
            echo "Deployed ${{ inputs.app_id }} to Google Play ${{ inputs.track }} track"
          fi
